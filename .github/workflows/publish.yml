name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch: {}  # allow manual re-run from the Actions tab

jobs:
  build-and-publish:
    name: Build sdist + wheel and upload to PyPI
    runs-on: ubuntu-latest

    # Use a GitHub Environment to scope the token and require approval if desired.
    environment:
      name: pypi
      url: https://pypi.org/p/n-orca

    permissions:
      # `contents: write` lets the final step attach built wheels to the GitHub Release.
      contents: write
      # `id-token: write` is required if you migrate to PyPI Trusted Publishing.
      # Token-based publish below does not need it, but leaving it on is harmless.
      id-token: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # so setuptools_scm-style versioning would work if added

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Sanity-check version matches the release tag
        run: |
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "pyproject version: $PYPROJECT_VERSION"
          echo "release tag:       $TAG_VERSION"
          if [ -n "$TAG_VERSION" ] && [ "$PYPROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::pyproject version ($PYPROJECT_VERSION) does not match release tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify package metadata
        run: python -m twine check dist/*

      - name: Upload to PyPI
        env:
          # Secret name convention; rename if your repo uses a different one.
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload --non-interactive dist/*

      - name: Attach built artifacts to the GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
