name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install n-orca with all extras
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch wheel — much smaller than the default cuda build
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
          python -m pip install -e ".[hf,mcp,test]"

      - name: Run tests
        run: python -m pytest -q

      - name: Verify every shipped example
        run: |
          for f in examples/*.n.orca.md examples/hf-generated/*.n.orca.md; do
            python -m n_orca.cli.main verify "$f"
          done
